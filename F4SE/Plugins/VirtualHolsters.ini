# ========================================
#      Mods Main Button Configuration
# ========================================
#
#      ------------------
#      Valid Buttons List
#      ------------------
#
#        (MAIN MENU / VATS) B / Y = 1
#        (RELOAD) Grip = 2
#        (ACTIVATE) A / X = 7
#        (SPRINT / FAVORITES) Touchpad / Thumbstick Press = 32
#
# ========================================


[Button Config]

# ======================
# Gameplay Mode Buttons:
# ======================

# Vive Wand restore: use dominant-hand Grip for holster/unholster.
HolsterButtonID = 2

# Dominant Hand: Enter Configuration Mode Button
ConfigModeButtonID = 32

# ====================
# Config Mode Buttons:
# ====================

# Off Hand: used to enable sphere scaling / moving the camera back controls when held.
ConfigModeShiftButtonID = 7

# Dominant Hand: Cycles through the 7 holsters (default is VATS)
CycleHolstersButtonID = 1

# Dominant Hand: Toggle FRIK "Selfie Mode" on or off.
ToggleSelfieModeButtonID = 32

# Vive Wand restore: keep rotation on Grip because A/X remains Activate.
ConfigRotateButtonID = 2


# ====================
# Main Options:
# ====================
[Main Options]

# Shipping default: false for a cleaner, more immersive Vive Wand experience.
# Set to true if you want to see the green spheres when your hand enters a holster zone.
DisplaySpheres = false

# Shipping default: false for comfort and to avoid extra hover vibration.
# Set to true if you want haptic feedback when your hand enters a holster zone.
EnableHaptics = false

# Set to false if you do not want to see visual holstered weapons on the players body, set to true if you do
DisplayWeapons = true

# Set to false if you are using the games left handed mode
isRightHanded = true

# Enable this to disable VATS NOTE: Does not work with the 'Bullet Time VATS VR' mod unless you change the your VATS button to something other than the default button.
bDisableVATS = false

# Grip holstering does not need to suppress the vanilla Activate button during holster overlap.
bDisableActivation = false

# Enable to print last holstered weapon name to log / for troubleshooting.
EnableLogging = false

# Adds a pause in milliseconds on save load before holstered weapons are displayed. This helps combat duplicate weapons falling from the sky and landing at the players feet. Lower it if you want the weapons to become visble quicker, raise it if you still see duplicate weapons.
PauseDisplayOnLoad = 500

# Duration haptics will play for when entering a holster zone (in seconds). 0.05 is the default.
hapticDuration = 0.15

# Intensity of haptics when entering a holster zone. 0.5 is the default.
hapticIntensity = 0.5


# ====================
# Config Mode Options:
# ====================
[Config Mode]

# Use to replace default weapon positions for your own - switch to false when done!!
MasterMode = false

# Increase or decrease thumbstick sensitivity when rotating weapons
RotateXMultiplier = 4.0
RotateYMultiplier = 4.0
RotateZMultiplier = 6.0

# How far to move the camera back when the 'CameraBack' button is pressed (whilst in Power Armor)
CameraMoveBackDist = 120

# How far to move the camera back when the 'CameraBack' button is pressed (whilst out of Power Armor)
CameraMoveBackDistPA = 240

#The current Holster Art which is being applied to a holster. Reset to 0 if you encounter issues.
Holster01CustomArtSlot = 1
Holster02CustomArtSlot = 0
Holster03CustomArtSlot = 0
Holster04CustomArtSlot = 0
Holster05CustomArtSlot = 0
Holster06CustomArtSlot = 0
Holster07CustomArtSlot = 0
PAHolster01CustomArtSlot = 0
PAHolster02CustomArtSlot = 0
PAHolster03CustomArtSlot = 0
PAHolster04CustomArtSlot = 0
PAHolster05CustomArtSlot = 0
PAHolster06CustomArtSlot = 0
PAHolster07CustomArtSlot = 0
