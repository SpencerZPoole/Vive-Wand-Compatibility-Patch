comments=Vive Wand Compatibility Patch 2.1.4 for Fallout VR Essentials. Install the flat archive through MO2, place it lower than Virtual Holsters and Root Fix, then manually copy your own Fallout 4 VR openvr_api.dll into this mod's Root folder.
notes=Vive Wand Compatibility Patch 2.1.4. Install Vive-Wand-Compatibility-Patch-2.1.4.zip through MO2 with Install a new mod from an archive. If MO2 asks for a name, use Vive Wand Compatibility Patch. Enable it and place it lower in the left pane than Virtual Holsters and Root Fix so it wins F4SE/Plugins/VirtualHolsters.ini and Root/openvr_api.dll. If manually extracting instead, create or use F:\Gingas Fallout VR Essentials\mods\Vive Wand Compatibility Patch and extract the loose archive contents into that folder so README.md, meta.ini, F4SE\, and Root\ are directly inside it. Manually copy your own vanilla Fallout 4 VR openvr_api.dll from the Fallout 4 VR install folder into Vive Wand Compatibility Patch\Root\openvr_api.dll. Then in MO2, select the intended active profile, open Tools > INI Editor, select the Fallout4Custom.ini tab, find [Workshop], set fItemRotationSpeed=1.0 and fItemHoldDistantSpeed=3.0, and click Save before closing. Repeat the INI step for any new or switched MO2 profile. This mod ships a Vive-friendly VirtualHolsters.ini with Grip holstering plus DisplaySpheres=false and EnableHaptics=false, and includes slim build 213 DialogueMenu right-trackpad touch-scroll. Version 2.1.4 is packaging-only and keeps the Dave-tested build 213 behavior. Valve's openvr_api.dll is not redistributed. Current 2.1.4 baseline uses [VR] iVRPlatformControllerOverride=-1 auto-detect; value 7 is only a fallback diagnostic for confirmed controller-identity regressions. HUGE SPECIAL THANKS TO MR. DAVE FOR PROVIDING THE VANILLA openvr_api.dll RESTORE FIX. THAT DISCOVERY IS THE HEART OF THIS PATCH, AND A VERY LARGE SHARE OF THE CREDIT FOR THIS MOD BELONGS TO HIM.
