comments=Vive Wand Compatibility Patch 2.1.3 for Fallout VR Essentials. Extract the whole Vive Wand Compatibility Patch folder into F:\Gingas Fallout VR Essentials\mods, put it lower than Virtual Holsters and Root Fix in MO2, then manually copy your own Fallout 4 VR openvr_api.dll into this mod's Root folder.
notes=Vive Wand Compatibility Patch 2.1.3. The release zip must contain a top-level Vive Wand Compatibility Patch folder; extract that whole folder, not just its contents, into F:\Gingas Fallout VR Essentials\mods so the final path is F:\Gingas Fallout VR Essentials\mods\Vive Wand Compatibility Patch. Enable it in MO2 and place it lower in the left pane than Virtual Holsters and Root Fix so it wins F4SE/Plugins/VirtualHolsters.ini and Root/openvr_api.dll. Manually copy your own vanilla Fallout 4 VR openvr_api.dll from the Fallout 4 VR install folder into Vive Wand Compatibility Patch\Root\openvr_api.dll. Then in MO2, select the intended active profile, open Tools > INI Editor, select the Fallout4Custom.ini tab, find [Workshop], set fItemRotationSpeed=1.0 and fItemHoldDistantSpeed=3.0, and click Save before closing. Repeat the INI step for any new or switched MO2 profile. This mod ships a Vive-friendly VirtualHolsters.ini with Grip holstering plus DisplaySpheres=false and EnableHaptics=false, and includes slim build 213 DialogueMenu right-trackpad touch-scroll. Version 2.1 introduced the dialogue bridge; version 2.1.1 is the Dave-tested correction for the build 212 callback reset regression; version 2.1.2 attempted a no-EXE PowerShell installer repack; version 2.1.3 removes all installer/script automation and uses manual setup. Valve's openvr_api.dll is not redistributed. Current 2.1.3 baseline uses [VR] iVRPlatformControllerOverride=-1 auto-detect; value 7 is only a fallback diagnostic for confirmed controller-identity regressions. HUGE SPECIAL THANKS TO MR. DAVE FOR PROVIDING THE VANILLA openvr_api.dll RESTORE FIX. THAT DISCOVERY IS THE HEART OF THIS PATCH, AND A VERY LARGE SHARE OF THE CREDIT FOR THIS MOD BELONGS TO HIM.
