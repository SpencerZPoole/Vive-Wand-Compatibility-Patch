comments=Vive Wand Compatibility Patch 2.1.1 for Fallout VR Essentials. Extract the whole Vive Wand Compatibility Patch folder into F:\Gingas Fallout VR Essentials\mods, put it lower than Virtual Holsters and Root Fix in MO2, then run Install Vanilla OpenVR for Vive Wands.exe.
notes=Vive Wand Compatibility Patch 2.1.1. The release zip must contain a top-level Vive Wand Compatibility Patch folder; extract that whole folder, not just its contents, into F:\Gingas Fallout VR Essentials\mods so the final path is F:\Gingas Fallout VR Essentials\mods\Vive Wand Compatibility Patch. Enable it in MO2, place it lower in the left pane than Virtual Holsters and Root Fix so it wins F4SE/Plugins/VirtualHolsters.ini and Root/openvr_api.dll, then run Install Vanilla OpenVR for Vive Wands.exe from inside the extracted mod folder. This mod restores the vanilla Fallout 4 VR OpenVR loader, ships a Vive-friendly VirtualHolsters.ini with Grip holstering plus DisplaySpheres=false and EnableHaptics=false, includes slim build 213 DialogueMenu right-trackpad touch-scroll, and sets [Workshop] fItemRotationSpeed=1.0 / fItemHoldDistantSpeed=3.0 in the active MO2 profile fallout4custom.ini. Version 2.1 introduced the dialogue bridge; version 2.1.1 is the Dave-tested correction for the build 212 callback reset regression. Run the installer after install/update and again after switching to or creating another MO2 profile. The installer copies the user's own vanilla Fallout 4 VR openvr_api.dll; Valve's DLL is not redistributed. The installer intentionally does not edit Documents/My Games/Fallout4VR/Fallout4Custom.ini. Current 2.1.1 baseline uses [VR] iVRPlatformControllerOverride=-1 auto-detect; value 7 is only a fallback diagnostic for confirmed controller-identity regressions. HUGE SPECIAL THANKS TO MR. DAVE FOR PROVIDING THE VANILLA openvr_api.dll RESTORE FIX. THAT DISCOVERY IS THE HEART OF THIS PATCH, AND A VERY LARGE SHARE OF THE CREDIT FOR THIS MOD BELONGS TO HIM.
